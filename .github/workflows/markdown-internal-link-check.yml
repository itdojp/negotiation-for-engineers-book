name: Markdown Internal Link Check

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  internal-link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check internal links (docs/**/*.md)
        run: python3 .github/scripts/check_internal_links.py

