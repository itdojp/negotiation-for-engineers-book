name: Markdown Internal Link Check

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch: {}

env:
  # Temporary opt-in during GitHub Actions' Node 20 -> Node 24 transition.
  # Ref: https://github.blog/changelog/2026-03-06-github-actions-transitions-from-node-20-to-node-24/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  internal-link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check internal links (docs/**/*.md)
        run: python3 .github/scripts/check_internal_links.py

